name: ci-webui-current

on:
  push:
    paths:
      - 'webui/current-ubuntu/**'
      - '.github/workflows/ci-webui-current.yml'
  pull_request:
    paths:
      - 'webui/current-ubuntu/**'
      - '.github/workflows/ci-webui-current.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday 6:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bareos-webui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: webui/current-ubuntu
          load: true
          tags: bareos-webui:test

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: webui/current-ubuntu
          load: true
          tags: bareos-webui:test

      - name: Test image
        run: |
          docker run --rm bareos-webui:test cat /etc/bareos-webui/directors.ini
          echo "Image test passed"

  push:
    needs: test
    if: |
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=current-ubuntu
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: webui/current-ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
